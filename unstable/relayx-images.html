<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RELAY — peer chat</title>
    <link rel="icon" href="https://raw.githubusercontent.com/notArqen/relay/main/assets/relayfav.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Bebas+Neue&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --surface2: #1a1a1a;
            --border: #2a2a2a;
            --accent: #e8ff47;
            --accent2: #ff4747;
            --text: #e8e8e0;
            --muted: #555;
            --sent-bg: #1e2a00;
            --sent-border: #3a5200;
            --recv-bg: #1a1a1a;
            --hover: #222;
            --scrollbar-thumb: #2a2a2a;
            --scrollbar-track: transparent;
        }

        body.theme-light {
            --bg: #f5f5f5;
            --surface: #fff;
            --surface2: #eaeaea;
            --border: #ccc;
            --accent: #b8cc00;
            --accent2: #ff4747;
            --text: #111;
            --muted: #777;
            --sent-bg: #e4fcae;
            --sent-border: #c8e88b;
            --recv-bg: #fff;
            --hover: #f0f0f0;
            --scrollbar-thumb: #ccc;
            --scrollbar-track: transparent;
        }

        body.theme-matrix {
            --bg: #000;
            --surface: #001100;
            --surface2: #002200;
            --border: #004400;
            --accent: #00ff00;
            --accent2: #ff0000;
            --text: #00ff00;
            --muted: #00aa00;
            --sent-bg: #003300;
            --sent-border: #00ff00;
            --recv-bg: #001100;
            --hover: #003300;
            --scrollbar-thumb: #004400;
            --scrollbar-track: transparent;
        }

        body.theme-ocean {
            --bg: #050b14;
            --surface: #0a1526;
            --surface2: #102038;
            --border: #1a365d;
            --accent: #4dd0e1;
            --accent2: #ff4747;
            --text: #e0f2f1;
            --muted: #4f83cc;
            --sent-bg: #0b2b3a;
            --sent-border: #1a5a7a;
            --recv-bg: #0a1526;
            --hover: #152c4a;
            --scrollbar-thumb: #1a365d;
            --scrollbar-track: transparent;
        }

        html,
        body {
            height: 100%;
            color: var(--text);
            background: var(--bg);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            overflow: hidden;
        }

        /* Global scrollbar styling */
        * {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }
        *::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        *::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        *::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 2px;
        }
        *::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        #app {
            display: flex;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.45s ease;
            z-index: 10;
            background: var(--bg);
        }

        .hidden-left {
            opacity: 0;
            transform: translateX(-60px);
            pointer-events: none;
        }

        .hidden-right {
            opacity: 0;
            transform: translateX(60px);
            pointer-events: none;
        }

        #lobby {
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .lobby-inner {
            width: 100%;
            max-width: 480px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
        }

        .logo-img {
            height: 72px;
            margin-bottom: 4px;
            object-fit: contain;
            animation: logoReveal 0.7s cubic-bezier(.16, 1, .3, 1) both;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 4px var(--accent))
        }

        @keyframes logoReveal {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tagline {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 44px;
            text-align: center;
            animation: fadeUp 0.6s 0.15s both;
        }

        .code-display {
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            position: relative;
        }

        .code-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 6px;
            color: var(--accent);
        }

        .copy-btn,
        .disc-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 5px 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .copy-btn:hover,
        .disc-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .wait-hint {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 36px;
            padding-left: 4px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input[type="text"],
        select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            padding: 12px 16px;
            outline: none;
            text-transform: uppercase;
            width: 100%
        }

        .connect-btn {
            background: var(--accent);
            border: none;
            color: #000;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 12px 18px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }

        .connect-btn:hover {
            background: #fff;
        }

        .connect-btn:disabled {
            background: var(--border);
            color: var(--muted);
            cursor: not-allowed;
        }

        .status-bar {
            font-size: 11px;
            padding: 10px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.4s;
            flex-shrink: 0;
        }

        .dot.ready {
            background: var(--accent);
            animation: pulseAccent 1.8s infinite;
        }

        .dot.connected {
            background: #47ff8a;
        }

        @keyframes pulseAccent {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(232, 255, 71, 0.6);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(232, 255, 71, 0);
            }
        }

        .error-msg {
            font-size: 11px;
            color: var(--accent2);
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: all 0.3s;
        }

        .error-msg.visible {
            max-height: 40px;
            opacity: 1;
            margin-top: 6px;
        }

        #app-inner {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100vh;
        }

        #sidebar {
            width: 260px;
            background: var(--surface2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(.16, 1, .3, 1);
            flex-shrink: 0;
            overflow: hidden;
        }

        #sidebar.collapsed {
            width: 0;
            border: none;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header img.logo-img {
            height: 20px;
            margin: 0;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-actions button {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px;
            font-size: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .sidebar-actions button:hover {
            background: var(--hover);
            border-color: var(--accent);
            color: var(--accent);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 4px;
            display: flex;
            flex-direction: column;
            color: var(--muted);
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: var(--surface);
        }

        .chat-item.active {
            background: var(--surface);
            color: var(--text);
            border-color: var(--border);
            border-left: 2px solid var(--accent);
        }

        .chat-item-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-item-preview {
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: var(--accent);
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            float: right;
            font-weight: bold;
        }

        #chat-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .chat-header {
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            flex-shrink: 0;
        }

        .chat-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--accent);
        }

        .chat-members {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 75%;
            padding: 10px 14px;
            line-height: 1.6;
            position: relative;
            word-break: break-word;
            display: flex;
            flex-direction: column;
        }

        .msg.sent {
            align-self: flex-end;
            background: var(--sent-bg);
            border: 1px solid var(--sent-border);
            border-radius: 4px 4px 0 4px;
        }

        .msg.recv {
            align-self: flex-start;
            background: var(--recv-bg);
            border: 1px solid var(--border);
            border-radius: 4px 4px 4px 0;
        }

        .msg-meta {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .msg-text {
            font-size: 13px;
            white-space: pre-wrap;
        }

        .msg-image {
            max-width: 100%;
            max-height: 300px;
            display: block;
            border-radius: 2px;
            margin-top: 4px;
            cursor: zoom-in;
        }

        .msg-image-caption {
            font-size: 12px;
            margin-top: 6px;
            white-space: pre-wrap;
            color: var(--text);
        }

        .msg-reply-block {
            border-left: 2px solid var(--accent);
            background: var(--bg);
            padding: 6px 10px;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            border-radius: 2px;
        }

        .msg-reactions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 6px;
        }

        .rx-badge {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2px 6px;
            font-size: 11px;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
        }

        .rx-badge:hover {
            border-color: var(--accent);
        }

        .rx-badge.rx-active {
            border-color: var(--accent);
            background: var(--sent-bg);
        }

        .msg-actions {
            position: absolute;
            top: -10px;
            right: 10px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px;
        }

        .msg.sent .msg-actions {
            right: auto;
            left: 10px;
        }

        .msg:hover .msg-actions {
            opacity: 1;
        }

        .msg-actions button {
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 11px;
        }

        .msg-actions button:hover {
            color: var(--accent);
        }

        .system-msg {
            align-self: center;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 10px;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .typing-wrap {
            padding: 0 28px 6px;
            min-height: 30px;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
        }

        .typing-indicator {
            font-size: 11px;
            color: var(--muted);
            opacity: 0;
            transition: all 0.3s;
        }

        .typing-indicator.visible {
            opacity: 1;
        }

        .chat-input-area {
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .reply-preview {
            padding: 8px 28px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reply-preview button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            padding: 2px 6px;
        }

        /* Image paste preview */
        #pastePreviewWrap {
            display: none;
            padding: 10px 28px 0;
            align-items: flex-start;
            gap: 10px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        #pastePreviewWrap.visible {
            display: flex;
        }

        #pastePreviewImg {
            max-height: 80px;
            max-width: 120px;
            border: 1px solid var(--border);
            border-radius: 2px;
            object-fit: cover;
        }

        #pastePreviewInfo {
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: center;
        }

        #pastePreviewInfo span {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #pastePreviewInfo button {
            background: none;
            border: 1px solid var(--border);
            color: var(--accent2);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            padding: 3px 8px;
            cursor: pointer;
            text-transform: uppercase;
            width: fit-content;
            transition: all 0.15s;
        }

        #pastePreviewInfo button:hover {
            border-color: var(--accent2);
        }

        .input-bar {
            display: flex;
            gap: 10px;
            padding: 16px 28px;
        }

        #msgInput {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            padding: 10px 14px;
            outline: none;
            resize: none;
            max-height: 100px;
            line-height: 1.5;
        }

        #msgInput:focus {
            border-color: var(--accent);
        }

        #sendBtn {
            background: var(--accent);
            border: none;
            color: #000;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            padding: 10px 28px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }

        #sendBtn:hover {
            background: #fff;
        }

        #sendBtn:disabled {
            background: var(--border);
            color: var(--muted);
            cursor: not-allowed;
        }

        /* Dialogs */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .dialog-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .dialog-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .dialog-box h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px;
            color: var(--accent);
            letter-spacing: 2px;
            font-weight: normal;
        }

        .dialog-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .dialog-buttons button {
            padding: 8px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            text-transform: uppercase;
            font-size: 11px;
        }

        .dialog-buttons button.primary {
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: 600;
        }

        .dialog-buttons button:hover {
            opacity: 0.8;
        }

        .reaction-picker {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 4px;
            display: none;
            gap: 4px;
            z-index: 50;
        }

        .reaction-picker.visible {
            display: flex;
        }

        .reaction-picker button {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.1s;
        }

        .reaction-picker button:hover {
            transform: scale(1.2);
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox.visible {
            display: flex;
        }
        #lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border: 1px solid var(--border);
        }
    </style>
</head>

<body class="theme-dark">
    <!-- LOBBY -->
    <div class="screen visible" id="lobby">
        <div class="lobby-inner">
            <img src="https://raw.githubusercontent.com/notArqen/relay/main/assets/relayfav.png" class="logo-img"
                alt="RELAY" />
            <div class="tagline">encrypted · peer to peer · ephemeral</div>
            <div style="animation:fadeUp 0.6s both; animation-delay:0.1s">
                <div
                    style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">
                    your pairing code</div>
                <div class="code-display" id="codeDisplay">
                    <span class="code-value" id="myCode">——————</span>
                    <button class="copy-btn" onclick="copyCode(this, myCode)">copy</button>
                </div>
                <div class="wait-hint">share this code — waiting for peer to connect...</div>
            </div>
            <div class="divider" style="animation:fadeUp 0.6s both; animation-delay:0.2s"><span>or join</span></div>
            <div style="animation:fadeUp 0.6s both; animation-delay:0.3s">
                <div
                    style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">
                    enter their pairing code</div>
                <div class="input-row">
                    <input type="text" id="pairInput" placeholder="e.g. AB12CD" maxlength="6"
                        oninput="this.value=this.value.toUpperCase(); document.getElementById('connectBtn').disabled=this.value.trim().length<4" />
                    <button class="connect-btn" id="connectBtn" onclick="connectFromLobby()" disabled>connect</button>
                </div>
                <div class="error-msg" id="errorMsg"></div>
            </div>
            <div class="status-bar" style="animation:fadeUp 0.6s both; animation-delay:0.4s">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">initializing...</span>
            </div>
            <div style="animation:fadeUp 0.6s both; animation-delay:0.5s; margin-top:24px; text-align:center">
                <a href="#" onclick="enterApp(); return false;"
                    style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:color 0.15s"
                    onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">skip to
                    app →</a>
            </div>
        </div>
    </div>

    <!-- APP INNER -->
    <div class="screen hidden-right" id="app-inner">
        <!-- SIDEBAR -->
        <div id="sidebar">
            <div class="sidebar-header">
                <img src="https://raw.githubusercontent.com/notArqen/relay/main/assets/relayfav.png" class="logo-img"
                    alt="RELAY" />
                <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-size:11px;color:var(--accent);font-weight:bold" id="sidebarMyCode"></span>
                    <button class="copy-btn" onclick="copyCode(this, myCode)"
                        style="padding:2px 4px;font-size:8px">copy</button>
                    <button class="disc-btn" onclick="showSettings()"
                        style="padding:2px 4px;font-size:8px;border:none">⚙️</button>
                </div>
            </div>
            <div class="sidebar-actions">
                <button onclick="showInviteDialog(false)">+ New DM</button>
                <button onclick="showNewGroupDialog()">+ New Group</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- CHAT PANE -->
        <div id="chat-pane">
            <div class="chat-header">
                <div style="display:flex;align-items:center;gap:10px">
                    <button class="disc-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"
                        style="font-size:14px;padding:4px 8px;border:none">☰</button>
                    <div>
                        <div class="chat-title" id="chatTitle">RELAY</div>
                        <div class="chat-members" id="chatMembers">select a chat...</div>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:14px;">
                    <div id="groupAddBtn" style="display:none"><button class="copy-btn"
                            onclick="showInviteDialog(true)">+ invite peer</button></div>
                    <button class="disc-btn" onclick="leaveCurrentRoom()">leave</button>
                </div>
            </div>
            <div id="messages"></div>
            <div class="typing-wrap">
                <div class="typing-indicator" id="typingIndicator">peer is typing...</div>
            </div>
            <div class="chat-input-area" id="chatInputArea" style="visibility:hidden">
                <div class="reply-preview" id="replyPreview" style="display:none">
                    <div>Reply to: <span id="replyPreviewText" style="color:var(--text)"></span></div>
                    <button onclick="cancelReply()">X</button>
                </div>
                <!-- Paste image preview -->
                <div id="pastePreviewWrap">
                    <img id="pastePreviewImg" src="" alt="preview" />
                    <div id="pastePreviewInfo">
                        <span id="pastePreviewLabel">image ready to send</span>
                        <button onclick="clearPastedImage()">✕ remove</button>
                    </div>
                </div>
                <div class="input-bar">
                    <textarea id="msgInput" rows="1" placeholder="type a message..." onkeydown="handleKey(event)"
                        oninput="handleTyping()"></textarea>
                    <button id="sendBtn" onclick="sendMessage()">send</button>
                </div>
            </div>

            <!-- REACTION PICKER -->
            <div class="reaction-picker" id="reactionPicker">
                <button onclick="pickReaction('👍')">👍</button>
                <button onclick="pickReaction('❤️')">❤️</button>
                <button onclick="pickReaction('😂')">😂</button>
                <button onclick="pickReaction('😲')">😲</button>
                <button onclick="pickReaction('😢')">😢</button>
                <button onclick="pickReaction('🔥')">🔥</button>
            </div>
        </div>
    </div>

    <!-- DIALOGS -->
    <div id="dialogOverlay" class="dialog-overlay">
        <div class="dialog-box" id="dialogBox"></div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="full size" />
    </div>

    <script>
        const APP_VERSION = '2.1';
        const MAX_IMAGE_DIMENSION = 1200; // downscale to fit within this
        const MAX_IMAGE_SIZE_BYTES = 512 * 1024; // 512KB target after compression

        let peer, myCode = '';
        let gConns = {};
        let gRooms = {};
        let activeRoomId = null;
        let replyToMsgId = null;
        let isTyping = false, typingTimeout, sendTypingTimeout;
        let pendingImageDataUrl = null; // holds pasted image before send

        function eId(id) { return document.getElementById(id); }
        function generateCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }
        function tNow() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        function esc(t) { return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/\n/g, '<br>'); }
        function linkify(t) { return t.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline;word-break:break-all;">$1</a>'); }
        function uuid() { return Math.random().toString(36).substring(2, 9); }

        // --- IMAGE DOWNSCALING ---
        function downscaleImage(dataUrl, callback) {
            const img = new Image();
            img.onload = () => {
                let { width, height } = img;
                const scale = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(width, height));
                width = Math.round(width * scale);
                height = Math.round(height * scale);

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Try quality 0.85 first, then reduce if still too large
                let quality = 0.85;
                let result = canvas.toDataURL('image/jpeg', quality);
                while (result.length > MAX_IMAGE_SIZE_BYTES * 1.37 && quality > 0.3) {
                    quality -= 0.1;
                    result = canvas.toDataURL('image/jpeg', quality);
                }
                callback(result, width, height);
            };
            img.src = dataUrl;
        }

        // --- PASTE HANDLER ---
        document.addEventListener('paste', (e) => {
            if (!activeRoomId) return;
            const items = e.clipboardData?.items;
            if (!items) return;
            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        downscaleImage(ev.target.result, (dataUrl, w, h) => {
                            pendingImageDataUrl = dataUrl;
                            showPastePreview(dataUrl, w, h);
                        });
                    };
                    reader.readAsDataURL(file);
                    e.preventDefault();
                    break;
                }
            }
        });

        function showPastePreview(dataUrl, w, h) {
            eId('pastePreviewImg').src = dataUrl;
            eId('pastePreviewLabel').textContent = `image ready · ${w}×${h}`;
            eId('pastePreviewWrap').classList.add('visible');
            eId('msgInput').placeholder = 'add a caption... (optional)';
            eId('msgInput').focus();
        }

        function clearPastedImage() {
            pendingImageDataUrl = null;
            eId('pastePreviewWrap').classList.remove('visible');
            eId('pastePreviewImg').src = '';
            eId('msgInput').placeholder = 'type a message...';
        }

        // --- INIT & CONNECTION ---
        function initPeer() {
            myCode = generateCode();
            setStatus('connecting to network...', '');
            peer = new Peer(myCode, {
                host: '0.peerjs.com', port: 443, secure: true, path: '/',
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', () => {
                eId('myCode').textContent = myCode;
                eId('sidebarMyCode').textContent = myCode;
                setStatus('ready — share your code', 'ready');
                eId('connectBtn').disabled = false;
                const t = localStorage.getItem('relay-theme') || 'theme-dark';
                document.body.className = t;
            });

            peer.on('connection', incoming => {
                gConns[incoming.peer] = incoming;
                setupConnection(incoming);
            });

            peer.on('disconnected', () => {
                setStatus('reconnecting...', '');
                if (peer && !peer.destroyed) {
                    setTimeout(() => {
                        try { peer.reconnect(); } catch (e) { console.warn('Reconnect failed:', e); }
                    }, 1000);
                }
            });

            peer.on('error', err => {
                console.error('Peer error:', err.type, err);
                const btn = eId('connectBtn');
                if (btn) {
                    btn.textContent = 'connect';
                    btn.disabled = eId('pairInput').value.trim().length < 4;
                }
                if (err.type === 'peer-unavailable') {
                    showError('could not find that peer. wrong code?');
                } else if (err.type === 'unavailable-id') {
                    peer.destroy();
                    initPeer();
                } else {
                    setStatus('network error: ' + err.type, 'error');
                    if (peer && !peer.destroyed) {
                        setTimeout(() => { try { peer.reconnect(); } catch (e) { } }, 2000);
                    }
                }
            });
        }

        function setupConnection(conn, onReady) {
            let opened = false;
            conn.on('open', () => {
                opened = true;
                gConns[conn.peer] = conn;
                conn.send({ type: 'hello', version: APP_VERSION, sender: myCode });
                if (onReady) onReady();
            });
            conn.on('data', data => handleData(conn.peer, data));
            conn.on('close', () => handleDisconnect(conn.peer));
            conn.on('error', (err) => {
                console.error('Connection error with', conn.peer, err);
                handleDisconnect(conn.peer);
            });
            setTimeout(() => {
                if (!opened && conn.open === false) {
                    console.warn('Connection timeout for', conn.peer);
                    try { conn.close(); } catch (e) { }
                    handleDisconnect(conn.peer);
                    const btn = eId('connectBtn');
                    if (btn) {
                        btn.textContent = 'connect';
                        btn.disabled = eId('pairInput').value.trim().length < 4;
                    }
                    showError('connection timed out. check the code and try again.');
                }
            }, 15000);
        }

        function handleDisconnect(peerId) {
            delete gConns[peerId];
            Object.values(gRooms).forEach(room => {
                if (!room.members.includes(peerId)) return;
                if (room.type === 'dm') {
                    const sysMsg = { id: uuid(), sender: '__system__', text: 'peer disconnected.', time: tNow(), reactions: {} };
                    room.messages.push(sysMsg);
                    if (activeRoomId === room.id) appendSystemUI('peer disconnected.');
                } else if (room.type === 'group') {
                    room.members = room.members.filter(m => m !== peerId);
                    const sysMsg = { id: uuid(), sender: '__system__', text: peerId + ' left the group.', time: tNow(), reactions: {} };
                    room.messages.push(sysMsg);
                    if (activeRoomId === room.id) {
                        appendSystemUI(peerId + ' left the group.');
                        renderChatHeader();
                    }
                    if (room.host === myCode) {
                        room.members.forEach(m => {
                            if (m !== myCode) sendToCode(m, { type: 'room-sync', room: room });
                        });
                    }
                }
            });
            renderSidebar();
        }

        function appendSystemUI(text) {
            const msgs = eId('messages');
            const d = document.createElement('div');
            d.className = 'system-msg';
            d.textContent = text;
            msgs.appendChild(d);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function connectFromLobby() {
            const code = eId('pairInput').value.trim().toUpperCase();
            if (code.length < 4) return;
            if (code === myCode) return showError("that's your own code, genius.");
            if (peer.disconnected) {
                showError('lost connection to network. reconnecting...');
                try { peer.reconnect(); } catch (e) { }
                return;
            }
            const btn = eId('connectBtn');
            btn.disabled = true;
            btn.textContent = 'connecting...';
            connectToPeer(code, () => {
                btn.textContent = 'connect';
                ensureDMRoom(code);
                enterApp();
            });
        }

        function connectToPeer(code, callback) {
            if (code === myCode) return;
            if (gConns[code] && gConns[code].open) { if (callback) callback(); return; }
            const conn = peer.connect(code, { reliable: true, serialization: 'json' });
            gConns[code] = conn;
            setupConnection(conn, callback);
        }

        // --- DATA PROTOCOL ---
        function handleData(peerId, data) {
            if (data.type === 'hello') {
                if (data.version !== APP_VERSION) {
                    if (gConns[peerId]) gConns[peerId].send({ type: 'error', msg: 'version mismatch. please match versions.' });
                    setTimeout(() => { if (gConns[peerId]) gConns[peerId].close(); }, 1000);
                    return;
                }
                if (gConns[peerId]) gConns[peerId].send({ type: 'hello-ack', version: APP_VERSION, sender: myCode });
                ensureDMRoom(peerId);
                if (eId('lobby') && eId('lobby').classList.contains('visible')) enterApp();
                if (activeRoomId === null) selectRoom(getDMId(myCode, peerId));
            }
            else if (data.type === 'hello-ack') {
                if (data.version !== APP_VERSION) { if (gConns[peerId]) gConns[peerId].close(); return; }
                ensureDMRoom(peerId);
                if (activeRoomId === null) selectRoom(getDMId(myCode, peerId));
            }
            else if (data.type === 'error') { alert("Peer Error: " + data.msg); }
            else if (data.type === 'room-sync') {
                const r = data.room;
                if (!gRooms[r.id]) {
                    gRooms[r.id] = { ...r, messages: [], unread: 1 };
                } else {
                    gRooms[r.id].members = r.members;
                    gRooms[r.id].title = r.title;
                }
                renderSidebar();
                if (activeRoomId === r.id) renderChatHeader();
            }
            else if (data.type === 'message') {
                const { roomId, msg } = data;
                const room = gRooms[roomId];
                if (!room) return;
                if (!room.messages.find(m => m.id === msg.id)) {
                    room.messages.push(msg);
                    if (activeRoomId === roomId) {
                        appendMsgUI(msg, room);
                    } else {
                        room.unread = (room.unread || 0) + 1;
                        renderSidebar();
                    }
                }
                if (room.type === 'group' && room.host === myCode) {
                    room.members.forEach(m => {
                        if (m !== myCode && m !== msg.sender) sendToCode(m, data);
                    });
                }
            }
            else if (data.type === 'typing') {
                if (activeRoomId === data.roomId) {
                    eId('typingIndicator').classList.add('visible');
                    eId('typingIndicator').textContent = data.sender + ' is typing...';
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => eId('typingIndicator').classList.remove('visible'), 3000);
                }
                if (gRooms[data.roomId]?.type === 'group' && gRooms[data.roomId].host === myCode) {
                    gRooms[data.roomId].members.forEach(m => {
                        if (m !== myCode && m !== data.sender) sendToCode(m, data);
                    });
                }
            }
            else if (data.type === 'reaction') {
                const { roomId, msgId, emoji, sender } = data;
                const room = gRooms[roomId];
                if (!room) return;
                const msg = room.messages.find(m => m.id === msgId);
                if (msg) {
                    if (!msg.reactions) msg.reactions = {};
                    if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
                    const idx = msg.reactions[emoji].indexOf(sender);
                    if (idx > -1) msg.reactions[emoji].splice(idx, 1);
                    else msg.reactions[emoji].push(sender);
                    if (activeRoomId === roomId) renderMessages();
                }
                if (room.type === 'group' && room.host === myCode) {
                    room.members.forEach(m => {
                        if (m !== myCode && m !== sender) sendToCode(m, data);
                    });
                }
            }
            else if (data.type === 'disconnect') { handleDisconnect(peerId); }
            else if (data.type === 'peer-leave') {
                const room = gRooms[data.roomId];
                if (!room) return;
                room.members = room.members.filter(m => m !== data.peerId);
                const sysMsg = { id: uuid(), sender: '__system__', text: data.peerId + ' left the group.', time: tNow(), reactions: {} };
                room.messages.push(sysMsg);
                if (activeRoomId === data.roomId) {
                    appendSystemUI(data.peerId + ' left the group.');
                    renderChatHeader();
                }
                renderSidebar();
                if (room.host === myCode) {
                    room.members.forEach(m => {
                        if (m !== myCode && m !== data.peerId) sendToCode(m, data);
                    });
                    room.members.forEach(m => {
                        if (m !== myCode) sendToCode(m, { type: 'room-sync', room: room });
                    });
                }
            }
        }

        function sendToCode(code, data) {
            if (gConns[code] && gConns[code].open) gConns[code].send(data);
        }
        function broadcastToRoom(roomId, data) {
            const room = gRooms[roomId];
            if (!room) return;
            if (room.type === 'dm') {
                const other = room.members.find(m => m !== myCode);
                if (other) sendToCode(other, data);
            } else if (room.type === 'group') {
                if (room.host === myCode) {
                    room.members.forEach(m => { if (m !== myCode) sendToCode(m, data); });
                } else {
                    sendToCode(room.host, data);
                }
            }
        }

        // --- APP & UI ---
        function enterApp() {
            eId('lobby').classList.replace('visible', 'hidden-left');
            eId('app-inner').classList.replace('hidden-right', 'visible');
        }

        function setStatus(text, state) {
            eId('statusText').textContent = text;
            eId('statusDot').className = 'dot' + (state ? ' ' + state : '');
        }
        function showError(msg) {
            eId('errorMsg').textContent = msg;
            eId('errorMsg').classList.add('visible');
        }
        function copyCode(btn, txt) {
            navigator.clipboard.writeText(txt);
            const orig = btn.textContent;
            btn.textContent = 'copied!';
            btn.style.color = 'var(--accent)';
            setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
        }

        function getDMId(c1, c2) { return [c1, c2].sort().join('-'); }
        function ensureDMRoom(peerId) {
            const id = getDMId(myCode, peerId);
            if (!gRooms[id]) {
                gRooms[id] = { id, title: peerId, type: 'dm', host: null, members: [myCode, peerId], messages: [], unread: 0 };
            }
            renderSidebar();
        }

        function renderSidebar() {
            const list = eId('chatList');
            list.innerHTML = '';
            Object.values(gRooms).forEach(r => {
                let title = r.type === 'dm' ? r.members.find(m => m !== myCode) || r.title : r.title;
                let lastMsg = r.messages[r.messages.length - 1];
                let preview = lastMsg
                    ? (lastMsg.sender === myCode ? 'You: ' : '') + (lastMsg.image ? '[image]' : lastMsg.text)
                    : 'No messages yet';
                const d = document.createElement('div');
                d.className = 'chat-item' + (activeRoomId === r.id ? ' active' : '');
                d.onclick = () => selectRoom(r.id);
                d.innerHTML = `
                    <div style="display:flex;justify-content:space-between">
                        <div class="chat-item-title">${esc(title)}</div>
                        ${r.unread ? `<div class="unread-badge">${r.unread}</div>` : ''}
                    </div>
                    <div class="chat-item-preview">${esc(preview)}</div>
                `;
                list.appendChild(d);
            });
        }

        function selectRoom(roomId) {
            activeRoomId = roomId;
            gRooms[roomId].unread = 0;
            renderSidebar();
            renderChatHeader();
            renderMessages();
            eId('chatInputArea').style.visibility = 'visible';
            eId('msgInput').focus();
            cancelReply();
        }

        function renderChatHeader() {
            const r = gRooms[activeRoomId];
            eId('chatTitle').textContent = r.type === 'dm' ? r.members.find(m => m !== myCode) || r.title : r.title;
            eId('chatMembers').textContent = r.members.join(', ');
            eId('groupAddBtn').style.display = (r.type === 'group' && r.host === myCode) ? 'block' : 'none';
        }

        function renderMessages() {
            const msgs = eId('messages');
            msgs.innerHTML = '';
            gRooms[activeRoomId].messages.forEach(m => appendMsgUI(m, gRooms[activeRoomId], msgs));
            msgs.scrollTop = msgs.scrollHeight;
        }

        function appendMsgUI(msg, room, container) {
            const msgs = container || eId('messages');
            const d = document.createElement('div');
            const isMe = msg.sender === myCode;
            d.className = 'msg ' + (isMe ? 'sent' : 'recv');
            d.dataset.id = msg.id;

            let html = `<div class="msg-meta"><span>${isMe ? 'you' : msg.sender}</span><span>${msg.time}</span></div>`;

            if (msg.replyToId) {
                const p = room.messages.find(x => x.id === msg.replyToId);
                if (p) html += `<div class="msg-reply-block">${p.image ? '[image]' : esc(p.text).substring(0, 40) + '...'}  </div>`;
            }

            if (msg.image) {
                html += `<img class="msg-image" src="${msg.image}" alt="image" onclick="openLightbox(this.src)" />`;
                if (msg.text) {
                    html += `<div class="msg-image-caption">${linkify(esc(msg.text))}</div>`;
                }
            } else {
                html += `<div class="msg-text">${linkify(esc(msg.text))}</div>`;
            }

            if (msg.reactions && Object.keys(msg.reactions).length > 0) {
                html += `<div class="msg-reactions">`;
                for (let [emo, users] of Object.entries(msg.reactions)) {
                    if (users.length > 0) {
                        const act = users.includes(myCode) ? 'rx-active' : '';
                        html += `<span class="rx-badge ${act}" onclick="toggleReaction('${msg.id}', '${emo}')">${emo} ${users.length}</span>`;
                    }
                }
                html += `</div>`;
            }

            html += `<div class="msg-actions">
                <button onclick="setReply('${msg.id}')">↩</button>
                <button onclick="showReactionPicker(event, '${msg.id}')">☺</button>
            </div>`;

            d.innerHTML = html;
            msgs.appendChild(d);
            if (!container) msgs.scrollTop = msgs.scrollHeight;
        }

        function sendMessage() {
            const input = eId('msgInput');
            const text = input.value.trim();
            if (!text && !pendingImageDataUrl) return;
            if (!activeRoomId) return;

            const msg = {
                id: uuid(),
                sender: myCode,
                text,
                image: pendingImageDataUrl || null,
                time: tNow(),
                replyToId: replyToMsgId,
                reactions: {}
            };

            gRooms[activeRoomId].messages.push(msg);
            broadcastToRoom(activeRoomId, { type: 'message', roomId: activeRoomId, msg });
            appendMsgUI(msg, gRooms[activeRoomId]);
            input.value = '';
            input.style.height = 'auto';
            cancelReply();
            clearPastedImage();
            renderSidebar();
            try { broadcastToRoom(activeRoomId, { type: 'stop-typing', roomId: activeRoomId, sender: myCode }); } catch (e) { }
            isTyping = false;
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }
        function handleTyping() {
            const i = eId('msgInput');
            i.style.height = 'auto'; i.style.height = Math.min(i.scrollHeight, 100) + 'px';
            if (!isTyping && activeRoomId) {
                isTyping = true;
                broadcastToRoom(activeRoomId, { type: 'typing', roomId: activeRoomId, sender: myCode });
            }
            clearTimeout(sendTypingTimeout);
            sendTypingTimeout = setTimeout(() => isTyping = false, 2000);
        }

        // --- REACTIONS & REPLIES ---
        function setReply(msgId) {
            replyToMsgId = msgId;
            const m = gRooms[activeRoomId].messages.find(x => x.id === msgId);
            eId('replyPreviewText').textContent = (m.image ? '[image] ' : '') + (m.text ? m.text.substring(0, 40) + '...' : '');
            eId('replyPreview').style.display = 'flex';
            eId('msgInput').focus();
        }
        function cancelReply() {
            replyToMsgId = null;
            eId('replyPreview').style.display = 'none';
        }

        let activeReactMsgId = null;
        function showReactionPicker(e, msgId) {
            e.stopPropagation();
            activeReactMsgId = msgId;
            const p = eId('reactionPicker');
            p.style.top = (e.pageY - 40) + 'px';
            p.style.left = (e.pageX - 60) + 'px';
            p.classList.add('visible');
        }
        document.addEventListener('click', () => eId('reactionPicker').classList.remove('visible'));

        function pickReaction(emoji) { toggleReaction(activeReactMsgId, emoji); }
        function toggleReaction(msgId, emoji) {
            if (!activeRoomId) return;
            const data = { type: 'reaction', roomId: activeRoomId, msgId, emoji, sender: myCode };
            handleData(myCode, data);
            broadcastToRoom(activeRoomId, data);
        }

        // --- LIGHTBOX ---
        function openLightbox(src) {
            eId('lightboxImg').src = src;
            eId('lightbox').classList.add('visible');
        }
        function closeLightbox() {
            eId('lightbox').classList.remove('visible');
            eId('lightboxImg').src = '';
        }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

        // --- DIALOGS ---
        function showDialog(html, onInit) {
            const o = eId('dialogOverlay'), b = eId('dialogBox');
            b.innerHTML = html;
            o.classList.add('visible');
            if (onInit) onInit();
        }
        function hideDialog() { eId('dialogOverlay').classList.remove('visible'); }

        function showInviteDialog(forGroup = false) {
            showDialog(`
                <h3>${forGroup ? 'Invite to Group' : 'New Direct Message'}</h3>
                <input type="text" id="dlgInput" placeholder="Enter peer code (e.g. AB12CD)" maxlength="6" oninput="this.value=this.value.toUpperCase()">
                <div class="dialog-buttons">
                    <button onclick="hideDialog()">Cancel</button>
                    <button class="primary" onclick="${forGroup ? 'submitInvite()' : 'submitNewDM()'}">Connect</button>
                </div>
            `, () => setTimeout(() => eId('dlgInput').focus(), 100));
        }

        function submitNewDM() {
            const code = eId('dlgInput').value.trim().toUpperCase();
            if (code.length < 4) return;
            hideDialog();
            connectToPeer(code, () => { ensureDMRoom(code); });
        }
        function submitInvite() {
            const code = eId('dlgInput').value.trim().toUpperCase();
            if (code.length < 4 || !activeRoomId) return;
            hideDialog();
            const r = gRooms[activeRoomId];
            if (r.type !== 'group' || r.host !== myCode) return alert("Only the host can invite.");
            connectToPeer(code, () => {
                if (!r.members.includes(code)) r.members.push(code);
                r.members.forEach(m => {
                    if (m !== myCode) sendToCode(m, { type: 'room-sync', room: r });
                });
                renderChatHeader();
            });
        }

        function showNewGroupDialog() {
            showDialog(`
                <h3>Create New Group</h3>
                <input type="text" id="dlgInput" placeholder="Group Name (e.g. My Awesome Chat)">
                <div class="dialog-buttons">
                    <button onclick="hideDialog()">Cancel</button>
                    <button class="primary" onclick="submitCreateGroup()">Create</button>
                </div>
            `, () => setTimeout(() => eId('dlgInput').focus(), 100));
        }
        function submitCreateGroup() {
            const title = eId('dlgInput').value.trim() || 'New Group';
            hideDialog();
            const id = myCode + '-group-' + uuid();
            gRooms[id] = { id, title, type: 'group', host: myCode, members: [myCode], messages: [], unread: 0 };
            renderSidebar();
            selectRoom(id);
        }

        function showSettings() {
            showDialog(`
                <h3>Settings</h3>
                <div style="font-size:11px;color:var(--muted);margin-bottom:8px">Select Theme</div>
                <select id="themeSelect">
                    <option value="theme-dark">Dark Minimal</option>
                    <option value="theme-light">Light Minimal</option>
                    <option value="theme-matrix">Matrix Green</option>
                    <option value="theme-ocean">Deep Ocean</option>
                </select>
                <div class="dialog-buttons">
                    <button onclick="hideDialog()">Close</button>
                    <button class="primary" onclick="saveSettings()">Save</button>
                </div>
            `, () => eId('themeSelect').value = document.body.className);
        }
        function saveSettings() {
            const t = eId('themeSelect').value;
            document.body.className = t;
            localStorage.setItem('relay-theme', t);
            hideDialog();
        }

        function leaveCurrentRoom() {
            if (!activeRoomId) return;
            const room = gRooms[activeRoomId];
            if (room) {
                if (room.type === 'dm') {
                    const other = room.members.find(m => m !== myCode);
                    if (other) sendToCode(other, { type: 'disconnect' });
                } else if (room.type === 'group') {
                    broadcastToRoom(activeRoomId, { type: 'peer-leave', roomId: activeRoomId, peerId: myCode });
                }
            }
            delete gRooms[activeRoomId];
            activeRoomId = null;
            eId('chatTitle').textContent = 'RELAY';
            eId('chatMembers').textContent = '';
            eId('messages').innerHTML = '';
            eId('chatInputArea').style.visibility = 'hidden';
            eId('groupAddBtn').style.display = 'none';
            clearPastedImage();
            renderSidebar();
        }

        initPeer();
    </script>
